<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1f3864">
<title>Expenses</title>
<style>
:root{
--navy:#1f3864; --navy2:#2f4f8f; --bg:#0f1626; --card:#172033;
--line:#2b3a55; --text:#eaf0fb; --muted:#9fb0cf; --accent:#5b8cff;
--green:#34c77b; --red:#ff6b6b; --gold:#ffcf5c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--text);
font-family:-apple-system,Roboto,Arial,sans-serif;font-size:17px;line-height:1.4}
header{background:var(--navy);padding:18px 16px;font-size:20px;font-weight:700;
position:sticky;top:0;z-index:5;letter-spacing:.3px}
.wrap{padding:16px;max-width:680px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
padding:16px;margin-bottom:16px}
h2{font-size:15px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
margin:0 0 14px}
label{display:block;font-size:14px;color:var(--muted);margin:12px 0 6px;font-weight:600}
input,select{width:100%;padding:14px;font-size:18px;border-radius:10px;
border:2px solid var(--line);background:#0e1626;color:var(--text)}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.row2{display:flex;gap:12px}
.row2>div{flex:1}
.who{display:flex;gap:12px;margin-top:6px}
.who button{flex:1;padding:16px;font-size:18px;font-weight:700;border-radius:10px;
border:2px solid var(--line);background:#0e1626;color:var(--text)}
.who button.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.submit{width:100%;margin-top:18px;padding:18px;font-size:19px;font-weight:800;
border:2px solid var(--green);border-radius:12px;background:#0e1626;color:var(--green)}
.submit:active{transform:scale(.99)}
.submit:disabled{opacity:.5}
.totgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tot{background:#0e1626;border:1px solid var(--line);border-radius:12px;padding:14px}
.tot .lab{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.tot .val{font-size:24px;font-weight:800;margin-top:4px}
.tot.full{grid-column:1/3}
.tot.larry .val{color:var(--accent)}
.tot.liz .val{color:var(--gold)}
.tot.liz .lab{color:var(--gold)}
.tot.total .val{color:var(--green)}
.bar{height:14px;border-radius:8px;overflow:hidden;display:flex;margin-top:8px;
border:1px solid var(--line)}
.bar .l{background:var(--accent)} .bar .z{background:var(--gold)}
.split{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:6px}
.msg{padding:10px 14px;border-radius:10px;margin-bottom:12px;font-weight:600;display:none}
.msg.ok{background:rgba(52,199,123,.15);color:var(--green);display:block}
.msg.err{background:rgba(255,107,107,.15);color:var(--red);display:block}
.cfg{font-size:13px;color:var(--muted)}
.cfg input{font-size:14px;padding:10px}
.muted{color:var(--muted);font-size:14px}
.empty{color:var(--muted);text-align:center;padding:20px}
.settle{margin-top:14px;padding:16px;border-radius:12px;text-align:center;
background:linear-gradient(135deg,rgba(52,199,123,.18),rgba(91,140,255,.14));
border:1px solid var(--line)}
.settle .big{font-size:22px;font-weight:800;margin-top:4px}
.settle .big .amt{color:var(--green)}
.settle .lab{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.settle.even .big{color:var(--muted);font-size:18px}
/* Entry rows */
.entry-row{border-bottom:1px solid var(--line);padding:12px 0;display:flex;align-items:flex-start;gap:10px}
.entry-row:last-child{border-bottom:none}
.entry-info{flex:1;min-width:0}
.entry-date{font-size:12px;color:var(--muted);margin-bottom:2px}
.entry-reason{font-size:15px;font-weight:700;color:var(--text)}
.entry-amounts{font-size:13px;color:var(--muted);margin-top:3px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:700}
.tag.larry{background:rgba(91,140,255,.2);color:var(--accent)}
.tag.liz{background:rgba(255,207,92,.2);color:var(--gold)}
.del-btn{padding:6px 12px;background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);
color:var(--red);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
flex-shrink:0;white-space:nowrap}
.del-btn:active{background:rgba(255,107,107,.3)}
</style>
</head>
<body>
<header>&#128176; Expenses &mdash; Larry &amp; Liz</header>
<div class="wrap">
<div id="msg" class="msg"></div>

<div class="card" id="cfgCard">
<h2>One-time setup</h2>
<label>Apps Script Web App URL</label>
<input id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
<button class="submit" onclick="saveUrl()">Save &amp; Load</button>
<p class="cfg" style="margin-top:10px">Paste the URL from your Apps Script deployment, tap Save.</p>
</div>

<div class="card" id="entryCard" style="display:none">
<h2>Add expense</h2>
<label>Type</label>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
<button type="button" id="typeExpense" onclick="setType('expense')" class="who sel" style="border-radius:10px;padding:14px;font-size:16px;font-weight:700">&#128184; Expense</button>
<button type="button" id="typeSettle" onclick="setType('settle')" class="who" style="border-radius:10px;padding:14px;font-size:16px;font-weight:700">&#129309; Settle Up</button>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<button type="button" onclick="exportData()" style="border-radius:10px;padding:12px;font-size:13px;font-weight:700;border:2px solid var(--green);background:transparent;color:var(--green);cursor:pointer">&#129534; Receipt</button>
<button type="button" onclick="clearAllEntries()" style="border-radius:10px;padding:12px;font-size:13px;font-weight:700;border:2px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer">&#10005; Clear All</button>
</div>
<label>Date</label>
<input type="date" id="date">

<!-- EXPENSE FIELDS -->
<div id="expense-fields">
<label>Reason</label>
<input type="text" id="reason" placeholder="e.g. Dinner at Carbone">
<label>Who paid</label>
<div class="who">
<button type="button" id="payLarry" onclick="setPayer('Larry')">Larry</button>
<button type="button" id="payLiz" onclick="setPayer('Liz')">Liz</button>
</div>
<div class="row2">
<div>
<label>Larry's split %</label>
<input type="number" id="split" inputmode="numeric" placeholder="50" min="0" max="100">
</div>
<div>
<label>Cost ($)</label>
<input type="number" id="cost" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
</div>
</div>
<p class="muted" id="splitHint" style="margin-top:8px"></p>
</div>

<!-- SETTLE UP FIELDS -->
<div id="settle-fields" style="display:none">
<!-- Balance display -->
<div id="settle-balance-display" style="background:rgba(91,140,255,.1);border:1px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:14px;text-align:center">
<div style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Current Balance</div>
<div id="settle-who-owes" style="font-size:20px;font-weight:800;color:var(--green)">Loading…</div>
<div id="settle-balance-detail" style="font-size:13px;color:var(--muted);margin-top:4px"></div>
</div>

<!-- Full or Partial -->
<label>Settlement type</label>
<div class="who" style="margin-bottom:14px">
<button type="button" id="settleFull" onclick="setSettleType('full')" class="sel">&#10003; Full</button>
<button type="button" id="settlePartial" onclick="setSettleType('partial')">Partial</button>
</div>

<!-- Amount — hidden for full, shown for partial -->
<div id="settle-amount-wrap" style="display:none">
<label>Amount ($)</label>
<input type="number" id="settle-amount" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
</div>

<div id="settle-summary" style="margin-top:12px;padding:12px;background:rgba(52,199,123,.08);border:1px solid rgba(52,199,123,.2);border-radius:10px;font-size:14px;color:var(--green);text-align:center"></div>
</div>

<button class="submit" id="addBtn" onclick="addExpense()">Add Expense</button>
</div>

<div class="card" id="totCard" style="display:none">
<h2>Totals</h2>
<div class="totgrid">
<div class="tot total full"><div class="lab">Total expenses</div><div class="val" id="tTotal">$0</div></div>
<div class="tot larry"><div class="lab">Larry Paid</div><div class="val" id="tLarryPaid">$0</div></div>
<div class="tot liz"><div class="lab">Liz Paid</div><div class="val" id="tLizPaid">$0</div></div>
<div class="tot larry"><div class="lab">Larry owes</div><div class="val" id="tLarry">$0</div></div>
<div class="tot liz"><div class="lab">Liz owes</div><div class="val" id="tLiz">$0</div></div>
</div>
<div class="bar" id="bar"><div class="l" style="width:50%"></div><div class="z" style="width:50%"></div></div>
<div class="split"><span id="pLarry">Larry 50%</span><span id="pLiz">Liz 50%</span></div>
<div class="settle" id="settle">
<div class="lab">Settle up</div>
<div class="big" id="settleText">All square</div>
</div>
</div>

<div class="card" id="listCard" style="display:none">
<h2>Entries</h2>
<div id="list"></div>
</div>
</div>

<script>
var API = localStorage.getItem('exp_api') || 'https://script.google.com/macros/s/AKfycbzxM8c2Ktdiwm3JESBUjXvW6Sn2xkBRweFKEBJVnumLRIXvmzOGuqk5LnEaM6T1ZcVm/exec';
var payer = '';
var txType = 'expense';
var settlePayer = '';
var settleType = 'full';
var settleBalance = 0;

function setSettleType(t) {
settleType = t;
document.getElementById('settleFull').classList.toggle('sel', t==='full');
document.getElementById('settlePartial').classList.toggle('sel', t==='partial');
var amtWrap = document.getElementById('settle-amount-wrap');
amtWrap.style.display = t==='partial' ? 'block' : 'none';
if (t==='full') document.getElementById('settle-amount').value = settleBalance.toFixed(2);
updateSettleSummary();
}

function updateSettleSummary() {
var amt = settleType==='full' ? settleBalance : (parseFloat(document.getElementById('settle-amount').value)||0);
var sumEl = document.getElementById('settle-summary');
if (!settlePayer || !amt) { sumEl.textContent=''; return; }
var recipient = settlePayer==='Larry' ? 'Liz' : 'Larry';
sumEl.textContent = settlePayer + ' pays ' + recipient + ' ' + money(amt) + ' → balances settle';
}

document.addEventListener('input', function(e){
if (e.target.id==='settle-amount') updateSettleSummary();
});

function setType(t) {
txType = t;
document.getElementById('typeExpense').classList.toggle('sel', t==='expense');
document.getElementById('typeSettle').classList.toggle('sel', t==='settle');
document.getElementById('expense-fields').style.display = t==='expense' ? 'block' : 'none';
document.getElementById('settle-fields').style.display = t==='settle' ? 'block' : 'none';
document.getElementById('addBtn').textContent = t==='settle' ? '🤝 Record Settle Up' : '➕ Add Expense';

if (t==='settle' && lastData && lastData.totals) {
var tot = lastData.totals;
var owes = document.getElementById('settle-who-owes');
var detail = document.getElementById('settle-balance-detail');
if (tot.settleAmount > 0.005) {
owes.textContent = tot.settleFrom + ' owes ' + tot.settleTo + ' ' + money(tot.settleAmount);
owes.style.color = 'var(--green)';
detail.textContent = 'Auto-selecting full settlement';
settlePayer = tot.settleFrom;
settleBalance = tot.settleAmount;
} else {
owes.textContent = 'All square — no balance to settle!';
owes.style.color = 'var(--muted)';
detail.textContent = '';
settleBalance = 0;
}
setSettleType('full');
updateSettleSummary();
}
}

/* ---- Visual receipt export (canvas -> PNG) ---- */
function exportData(){
if(!lastData || !lastData.rows || !lastData.rows.length){ showMsg('No entries to export', false); return; }
var rows = lastData.rows;
var t = lastData.totals || {};

var W = 480, PAD = 28, CW = W - PAD*2, ZIG = 14, ROW_H = 44;

// Precompute total content height (must match the drawing steps below)
var y = 0;
y += 34; // title
y += 22; // subtitle
y += 18; // exported date
y += 16; // gap + dashed
y += 20; // column header
y += 22; // gap + dashed
y += rows.length * ROW_H; // item rows
y += 18; // gap + dashed
y += 26; // Larry paid
y += 30; // Liz paid
y += 16; // TOTAL
y += 18; // gap + dashed
y += 26; // Larry owes
y += 20; // Liz owes
y += 70; // settle box + gap
y += 20; // footer
var H = ZIG*2 + PAD*2 + y;

var scale = 2;
var canvas = document.createElement('canvas');
canvas.width = W*scale; canvas.height = H*scale;
var ctx = canvas.getContext('2d');
ctx.scale(scale, scale);

ctx.fillStyle = '#fdfcf8';
ctx.fillRect(0,0,W,H);

function zigzag(yBase, pointsUp){
var teeth = Math.round(W/16), tw = W/teeth;
ctx.beginPath();
ctx.moveTo(0, pointsUp ? 0 : H);
ctx.lineTo(0, yBase);
for(var i=0;i<teeth;i++){
var xMid = i*tw + tw/2, xEnd = (i+1)*tw;
ctx.lineTo(xMid, yBase + (pointsUp ? -ZIG : ZIG));
ctx.lineTo(xEnd, yBase);
}
ctx.lineTo(W, pointsUp ? 0 : H);
ctx.closePath();
ctx.fillStyle = '#0f1626';
ctx.fill();
}
zigzag(ZIG, true);
zigzag(H-ZIG, false);

var cx = W/2, cy = ZIG + PAD;

function dashedLine(yPos){
ctx.strokeStyle = '#ccc';
ctx.setLineDash([4,3]);
ctx.beginPath();
ctx.moveTo(PAD, yPos);
ctx.lineTo(W-PAD, yPos);
ctx.stroke();
ctx.setLineDash([]);
}

ctx.textAlign = 'center';
ctx.fillStyle = '#1f3864';
ctx.font = '700 22px Courier New, monospace';
ctx.fillText('NY EXPENSES', cx, cy); cy += 26;

ctx.font = '600 14px Courier New, monospace';
ctx.fillStyle = '#666';
ctx.fillText('Larry & Liz', cx, cy); cy += 20;

ctx.font = '12px Courier New, monospace';
ctx.fillStyle = '#999';
ctx.fillText('Exported ' + new Date().toLocaleString(), cx, cy); cy += 16;

dashedLine(cy); cy += 16;

ctx.textAlign = 'left';
ctx.font = '700 11px Courier New, monospace';
ctx.fillStyle = '#333';
ctx.fillText('ITEM', PAD, cy);
ctx.textAlign = 'right';
ctx.fillText('AMOUNT', W-PAD, cy);
cy += 8;
dashedLine(cy); cy += 22;

rows.forEach(function(r){
var paidColor = r.whoPaid==='Larry' ? '#2f4f8f' : '#b8860b';
ctx.textAlign = 'left';
ctx.font = '700 13px Courier New, monospace';
ctx.fillStyle = '#1a1a1a';
var reason = String(r.reason||'');
if(reason.length>28) reason = reason.slice(0,27)+'…';
ctx.fillText(reason, PAD, cy);
ctx.textAlign = 'right';
ctx.fillText(money(r.cost), W-PAD, cy);
cy += 18;
ctx.textAlign = 'left';
ctx.font = '12px Courier New, monospace';
ctx.fillStyle = paidColor;
ctx.fillText((r.date||'') + '  •  ' + r.whoPaid + ' paid', PAD, cy);
cy += 26;
});

dashedLine(cy); cy += 18;

ctx.textAlign = 'left';
ctx.font = '13px Courier New, monospace';
ctx.fillStyle = '#2f4f8f';
ctx.fillText('Larry paid', PAD, cy);
ctx.textAlign = 'right';
ctx.fillStyle = '#1a1a1a';
ctx.fillText(money(t.larryPaid||0), W-PAD, cy);
cy += 26;

ctx.textAlign = 'left';
ctx.fillStyle = '#b8860b';
ctx.fillText('Liz paid', PAD, cy);
ctx.textAlign = 'right';
ctx.fillStyle = '#1a1a1a';
ctx.fillText(money(t.lizPaid||0), W-PAD, cy);
cy += 30;

ctx.textAlign = 'left';
ctx.font = '700 16px Courier New, monospace';
ctx.fillStyle = '#1f9d55';
ctx.fillText('TOTAL', PAD, cy);
ctx.textAlign = 'right';
ctx.fillText(money(t.totalCost||0), W-PAD, cy);
cy += 16;

dashedLine(cy); cy += 18;

ctx.textAlign = 'left';
ctx.font = '13px Courier New, monospace';
ctx.fillStyle = '#2f4f8f';
ctx.fillText('Larry owes', PAD, cy);
ctx.textAlign = 'right';
ctx.fillStyle = '#1a1a1a';
ctx.fillText(money(t.larryOwes||0), W-PAD, cy);
cy += 26;

ctx.textAlign = 'left';
ctx.fillStyle = '#b8860b';
ctx.fillText('Liz owes', PAD, cy);
ctx.textAlign = 'right';
ctx.fillStyle = '#1a1a1a';
ctx.fillText(money(t.lizOwes||0), W-PAD, cy);
cy += 24;

var boxY = cy, boxH = 46, hasSettle = t.settleAmount && t.settleAmount>0.005;
ctx.fillStyle = hasSettle ? '#eaf7ee' : '#f2f2f2';
ctx.fillRect(PAD, boxY, CW, boxH);
ctx.strokeStyle = '#ddd';
ctx.strokeRect(PAD, boxY, CW, boxH);
ctx.textAlign = 'center';
ctx.font = '700 14px Courier New, monospace';
ctx.fillStyle = hasSettle ? '#1f9d55' : '#888';
var settleMsg = hasSettle
? (t.settleFrom + ' owes ' + t.settleTo + ' ' + money(t.settleAmount))
: 'All square — nobody owes';
ctx.fillText(settleMsg, cx, boxY + boxH/2 + 5);
cy = boxY + boxH + 24;

ctx.textAlign = 'center';
ctx.font = '12px Courier New, monospace';
ctx.fillStyle = '#999';
ctx.fillText('★ Thanks for keeping it square ★', cx, cy);

canvas.toBlob(function(blob){
var fileName = 'expenses-receipt-' + new Date().toISOString().slice(0,10) + '.png';
var file = new File([blob], fileName, {type:'image/png'});
if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({files:[file], title:'NY Expenses Receipt'}).catch(function(){});
} else {
var url = URL.createObjectURL(blob);
var a = document.createElement('a');
a.href = url; a.download = fileName;
document.body.appendChild(a); a.click(); document.body.removeChild(a);
URL.revokeObjectURL(url);
}
showMsg('Receipt ready ✓', true);
}, 'image/png');
}

function clearAllEntries() {
if (!confirm('Delete ALL entries? This cannot be undone. Tip: tap Receipt first to save a copy.')) return;
showMsg('Clearing…', true);
fetch(API, {method:'POST', body:JSON.stringify({action:'clearAll'})})
.then(function(r){return r.json();})
.then(function(){ return fetch(API).then(function(r){return r.json();}); })
.then(function(fresh){
render(fresh);
if (fresh.rows && fresh.rows.length) {
showMsg('Clear did not fully complete — entries still remain', false);
} else {
showMsg('All entries cleared ✓', true);
}
})
.catch(function(){ showMsg('Error clearing entries', false); });
}

function clearForm() {
document.getElementById('reason').value = '';
document.getElementById('split').value = '';
document.getElementById('cost').value = '';
document.getElementById('splitHint').textContent = '';
document.getElementById('settle-amount').value = '';
payer = ''; settlePayer = ''; settleBalance = 0;
document.getElementById('payLarry').classList.remove('sel');
document.getElementById('payLiz').classList.remove('sel');
var sf = document.getElementById('settle-summary'); if(sf) sf.textContent='';
}

var lastData = null;
function showMsg(t, ok){
var m=document.getElementById('msg');
m.textContent=t; m.className='msg '+(ok?'ok':'err');
setTimeout(function(){m.className='msg';},3500);
}
function money(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pct(n){return (Math.round((Number(n)||0)*1000)/10)+'%';}

function setPayer(p){
payer=p;
document.getElementById('payLarry').classList.toggle('sel',p==='Larry');
document.getElementById('payLiz').classList.toggle('sel',p==='Liz');
}

document.getElementById('split').addEventListener('input',function(){
var v=Number(this.value);
var h=document.getElementById('splitHint');
if(isNaN(v)||this.value===''){h.textContent='';return;}
h.textContent='Larry pays '+v+'%, Liz pays '+(100-v)+'%';
});

function saveUrl(){
var u=document.getElementById('apiUrl').value.trim();
if(!u){showMsg('Paste a URL first',false);return;}
localStorage.setItem('exp_api',u); API=u;
document.getElementById('cfgCard').style.display='none';
load();
}

function showApp(){
document.getElementById('cfgCard').style.display=API?'none':'block';
document.getElementById('entryCard').style.display='block';
document.getElementById('totCard').style.display='block';
document.getElementById('listCard').style.display='block';
}

function load(){
if(!API){return;}
showApp();
fetch(API)
.then(function(r){return r.json();})
.then(function(data){ lastData=data; render(data); })
.catch(function(){showMsg('Could not reach the sheet. Check the URL.',false);});
}

function render(data){
lastData = data;
var t=data.totals||{};
document.getElementById('tTotal').textContent=money(t.totalCost);
document.getElementById('tLarryPaid').textContent=money(t.larryPaid||0);
document.getElementById('tLizPaid').textContent=money(t.lizPaid||0);
document.getElementById('tLarry').textContent=money(t.larryOwes);
document.getElementById('tLiz').textContent=money(t.lizOwes);
var lp=(t.larryPct||0)*100, zp=(t.lizPct||0)*100;
document.getElementById('bar').innerHTML=
'<div class="l" style="width:'+lp+'%"></div><div class="z" style="width:'+zp+'%"></div>';
document.getElementById('pLarry').textContent='Larry '+pct(t.larryPct);
document.getElementById('pLiz').textContent='Liz '+pct(t.lizPct);
var sEl=document.getElementById('settle'), sTxt=document.getElementById('settleText');
if(t.settleAmount && t.settleAmount>0.005){
sEl.classList.remove('even');
sTxt.innerHTML=t.settleFrom+' pays '+t.settleTo+' <span class="amt">'+money(t.settleAmount)+'</span>';
} else {
sEl.classList.add('even');
sTxt.textContent='All square \u2014 nobody owes';
}
var rows=(data.rows||[]).slice().reverse();
var el=document.getElementById('list');
if(!rows.length){el.innerHTML='<div class="empty">No expenses yet.</div>';return;}
var html='';
rows.forEach(function(r, i){
var rowIdx = (data.rows||[]).length - 1 - i; // original index
var typeTag=r.type==='settle'?'<span class="tag" style="background:rgba(63,185,80,.2);color:var(--green)">🤝 Settle Up</span>':'';
var tag=r.whoPaid==='Larry'?'<span class="tag larry">Larry paid</span>':'<span class="tag liz">Liz paid</span>';
html+='<div class="entry-row">'+
'<div class="entry-info">'+
'<div class="entry-date">'+r.date+'</div>'+
'<div class="entry-reason">'+r.reason+'</div>'+
'<div class="entry-amounts">'+tag+
' &nbsp;Total: '+money(r.cost)+
' &nbsp;L: '+money(r.larryOwes)+
' &nbsp;Z: '+money(r.lizOwes)+
'</div>'+
'</div>'+
'<button class="del-btn" onclick="deleteEntry('+rowIdx+',\''+encodeURIComponent(r.reason)+'\')">🗑 Delete</button>'+
'</div>';
});
el.innerHTML=html;
}

function deleteEntry(rowIdx, encodedReason){
var reason=decodeURIComponent(encodedReason);
if(!confirm('Delete "'+reason+'"?')){return;}
showMsg('Deleting…',true);
fetch(API,{method:'POST',body:JSON.stringify({action:'delete',rowIndex:rowIdx})})
.then(function(r){return r.json();})
.then(function(data){ render(data); showMsg('Deleted ✓',true); })
.catch(function(){showMsg('Delete failed — check connection',false);});
}

function addExpense(){
if (txType === 'settle') {
var amt = settleType==='full' ? settleBalance : (parseFloat(document.getElementById('settle-amount').value)||0);
if (!amt || amt <= 0) { showMsg('No balance to settle', false); return; }
if (!settlePayer) { showMsg('Could not determine who pays', false); return; }
var btn = document.getElementById('addBtn');
btn.disabled = true; btn.textContent = 'Saving…';
var split = settlePayer === 'Larry' ? 0 : 1;
var recipient = settlePayer === 'Larry' ? 'Liz' : 'Larry';
var payload = {
date: document.getElementById('date').value,
reason: '🤝 ' + settlePayer + ' settles up with ' + recipient + (settleType==='partial' ? ' (partial)' : ''),
whoPaid: settlePayer,
split: split,
cost: amt,
type: 'settle'
};
fetch(API, {method:'POST', body:JSON.stringify(payload)})
.then(function(r){return r.json();})
.then(function(data){
render(data);
clearForm();
showMsg('Settle up recorded ✓', true);
btn.disabled = false; btn.textContent = '🤝 Record Settle Up';
})
.catch(function(){
showMsg('Save failed', false);
btn.disabled = false; btn.textContent = '🤝 Record Settle Up';
});
return;
}

var date=document.getElementById('date').value;
var reason=document.getElementById('reason').value.trim();
var splitV=document.getElementById('split').value;
var cost=document.getElementById('cost').value;
if(!date){showMsg('Pick a date',false);return;}
if(!reason){showMsg('Add a reason',false);return;}
if(!payer){showMsg('Tap who paid',false);return;}
if(splitV===''){showMsg('Enter Larry\u2019s split %',false);return;}
if(cost===''){showMsg('Enter a cost',false);return;}
var btn=document.getElementById('addBtn');
btn.disabled=true; btn.textContent='Saving\u2026';
var payload={date:date,reason:reason,whoPaid:payer,
split:Number(splitV)/100, cost:Number(cost), type:txType};
fetch(API,{method:'POST',body:JSON.stringify(payload)})
.then(function(r){return r.json();})
.then(function(data){
render(data);
clearForm();
showMsg('Added \u2713',true);
btn.disabled=false; btn.textContent='Add expense';
})
.catch(function(){
showMsg('Save failed \u2014 check connection',false);
btn.disabled=false; btn.textContent='Add expense';
});
}
